<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat dos Amigos | Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .chat-container { height: calc(100vh - 140px); }
        .admin-badge { background: linear-gradient(90deg, #ff8a00, #e52e71); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .message-me { background-color: #0084ff; color: white; align-self: flex-end; border-radius: 18px 18px 4px 18px; }
        .message-them { background-color: #e4e6eb; color: black; align-self: flex-start; border-radius: 18px 18px 18px 4px; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #ddd; }
        #call-overlay { z-index: 100; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body class="bg-gray-100">

    <div id="app" class="max-w-lg mx-auto bg-white min-h-screen shadow-2xl relative">
        
        <!-- LOGIN / REGISTER SCREEN -->
        <div id="auth-screen" class="absolute inset-0 z-50 bg-white flex flex-col items-center justify-center p-8">
            <div class="w-full max-w-sm">
                <div class="text-center mb-8">
                    <i class="fa-solid fa-comments text-5xl text-blue-500 mb-2"></i>
                    <h1 class="text-3xl font-bold text-gray-800">Chat Amigos</h1>
                    <p class="text-gray-500">Entre para conversar</p>
                </div>
                
                <div class="space-y-4">
                    <input type="text" id="auth-user" placeholder="Usuário" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="password" id="auth-pass" placeholder="Senha" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    
                    <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                        Entrar / Criar Conta
                    </button>
                </div>
                <p class="mt-6 text-xs text-center text-gray-400">Se o usuário não existir, ele será criado automaticamente.</p>
            </div>
        </div>

        <!-- MAIN CHAT INTERFACE -->
        <div id="chat-interface" class="hidden flex flex-col h-screen">
            <!-- Header -->
            <header class="glass-nav px-4 py-3 flex items-center justify-between sticky top-0">
                <div class="flex items-center">
                    <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full mr-2"></div>
                    <h2 class="font-bold text-lg">Chat Geral</h2>
                    <div id="admin-indicator" class="hidden ml-2 admin-badge uppercase">ADMIN</div>
                </div>
                <div class="flex space-x-4">
                    <button onclick="toggleAdminPanel()" id="admin-btn" class="hidden text-orange-500"><i class="fa-solid fa-shield-halved"></i></button>
                    <button onclick="openCall()" class="text-blue-500 text-lg"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </header>

            <!-- Admin Panel (Floating) -->
            <div id="admin-panel" class="hidden bg-gray-900 text-white p-4 absolute top-14 left-0 right-0 z-40 border-b border-orange-500">
                <h3 class="font-bold text-orange-500 mb-2 underline italic">Painel de Controle YOHAN</h3>
                <div class="flex flex-wrap gap-2">
                    <button onclick="adminAction('clear')" class="bg-red-600 px-3 py-1 rounded text-xs">Limpar Histórico</button>
                    <button onclick="adminAction('alert')" class="bg-blue-600 px-3 py-1 rounded text-xs">Aviso Global</button>
                    <button onclick="adminAction('close')" class="bg-gray-700 px-3 py-1 rounded text-xs">Fechar Painel</button>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messages-display" class="chat-container overflow-y-auto p-4 flex flex-col space-y-3">
                <!-- Mensagens carregadas aqui -->
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-white border-t flex items-center sticky bottom-0">
                <button class="text-gray-400 mr-3 text-xl"><i class="fa-regular fa-face-smile"></i></button>
                <input type="text" id="msg-input" placeholder="Digite uma mensagem..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none focus:bg-white focus:ring-1 focus:ring-blue-300">
                <button onclick="send()" class="ml-3 text-blue-600 font-bold text-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- CALL OVERLAY -->
        <div id="call-overlay" class="hidden fixed inset-0 flex flex-col items-center justify-between py-24 text-white">
            <div class="text-center">
                <div class="w-32 h-32 bg-gray-700 rounded-full mx-auto mb-6 flex items-center justify-center border-4 border-blue-500 animate-pulse">
                    <i class="fa-solid fa-user text-5xl"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">Chamada de Grupo</h2>
                <p class="text-blue-400">Em conexão...</p>
            </div>
            <div class="flex space-x-12">
                <button class="w-16 h-16 bg-gray-600 rounded-full flex items-center justify-center text-2xl"><i class="fa-solid fa-microphone"></i></button>
                <button onclick="closeCall()" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center text-2xl"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'amigos-chat-yohan';

        let userSession = null;
        let unsubscribeMessages = null;

        // AUTHENTICATION LOGIC
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        window.handleAuth = async () => {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();

            if(!user || !pass) return alert("Preencha usuário e senha!");

            userSession = { name: user, isAdmin: user.toUpperCase() === 'YOHAN' };
            localStorage.setItem('chat_user', JSON.stringify(userSession));
            
            await initAuth();
        };

        onAuthStateChanged(auth, (user) => {
            if (user && userSession) {
                initApp();
            }
        });

        const initApp = () => {
            if(!userSession) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-interface').classList.remove('hidden');

            if(userSession.isAdmin) {
                document.getElementById('admin-indicator').classList.remove('hidden');
                document.getElementById('admin-btn').classList.remove('hidden');
            }

            loadMessages();
        };

        // LOAD MESSAGES
        const loadMessages = () => {
            if (!auth.currentUser) return;
            
            // Cleanup existing listener if any
            if (unsubscribeMessages) unsubscribeMessages();

            const q = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'messages'),
                orderBy('createdAt', 'asc')
            );

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const display = document.getElementById('messages-display');
                display.innerHTML = "";
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.user === userSession.name;
                    
                    const div = document.createElement('div');
                    div.className = `max-w-[80%] p-3 mb-1 flex flex-col ${isMe ? 'message-me' : 'message-them'}`;
                    
                    const meta = `<span class="text-[10px] opacity-60 mb-1 font-bold">${data.isAdmin ? '[ADMIN] ' : ''}${data.user}</span>`;
                    div.innerHTML = `${meta}<div class="text-sm">${data.text}</div>`;
                    
                    display.appendChild(div);
                });
                display.scrollTop = display.scrollHeight;
            }, (err) => {
                console.error("Firestore error:", err);
            });
        };

        // SEND MESSAGE
        window.send = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !auth.currentUser) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    text: text,
                    user: userSession.name,
                    isAdmin: !!userSession.isAdmin,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            } catch (e) {
                console.error("Error sending message:", e);
            }
        };

        // ADMIN ACTIONS
        window.toggleAdminPanel = () => {
            const p = document.getElementById('admin-panel');
            p.classList.toggle('hidden');
        };

        window.adminAction = async (action) => {
            if (!auth.currentUser || !userSession.isAdmin) return;

            if(action === 'clear') {
                if(confirm("Deseja apagar TODO o chat?")) {
                    const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'messages'));
                    for (const d of snap.docs) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', d.id));
                    }
                }
            } else if (action === 'alert') {
                const msg = prompt("Digite o aviso global:");
                if(msg) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                        text: `📢 AVISO DO ADMIN: ${msg}`,
                        user: "SISTEMA",
                        isAdmin: true,
                        createdAt: serverTimestamp()
                    });
                }
            } else {
                toggleAdminPanel();
            }
        };

        // CALL HANDLERS
        window.openCall = () => document.getElementById('call-overlay').classList.remove('hidden');
        window.closeCall = () => document.getElementById('call-overlay').classList.add('hidden');

        // LOGOUT
        window.logout = () => {
            localStorage.removeItem('chat_user');
            auth.signOut().then(() => location.reload());
        };

        // Event listeners
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') send();
        });

        // Check persistent session
        const saved = localStorage.getItem('chat_user');
        if(saved) {
            userSession = JSON.parse(saved);
            initAuth();
        }

    </script>
</body>
</html>
