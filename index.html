<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTAMIGOS</title>
    <!-- Ícone da Aba do Navegador -->
    <link rel="icon" type="image/png" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/svgs/solid/bolt.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #0084ff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; margin: 0; overscroll-behavior: none; }
        .message-me { background: linear-gradient(135deg, var(--primary), #0061ff); color: white; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .message-them { background: white; color: #1e293b; align-self: flex-start; border-radius: 20px 20px 20px 4px; border: 1px solid #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #e2e8f0; }
        .call-pulse { animation: ring-glow 1.5s infinite; }
        @keyframes ring-glow { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); } 70% { box-shadow: 0 0 0 20px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }
        #chat-feed::-webkit-scrollbar { width: 4px; }
        #chat-feed::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen relative flex flex-col overflow-hidden shadow-2xl">
        <audio id="ringtone" loop><source src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
        <audio id="pop-sound"><source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

        <!-- Auth -->
        <div id="auth-screen" class="absolute inset-0 z-[100] bg-white flex flex-col items-center justify-center p-8 transition-opacity duration-500">
            <div class="w-full text-center space-y-6">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-xl mx-auto animate-bounce">
                    <i class="fa-solid fa-bolt text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase">INSTAMIGOS</h1>
                <input type="text" id="auth-name" placeholder="Teu nome..." class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-bold outline-none focus:border-blue-500">
                <button onclick="doAuth()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Entrar</button>
            </div>
        </div>

        <!-- Chat Main -->
        <div id="main-chat" class="hidden flex flex-col h-screen">
            <header class="glass px-4 py-3 flex items-center justify-between sticky top-0 z-50">
                <div class="flex items-center gap-3 cursor-pointer" onclick="document.getElementById('profile-modal').classList.remove('hidden')">
                    <div id="nav-avatar" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black">?</div>
                    <div>
                        <h2 id="nav-name" class="font-bold text-slate-900 text-sm">...</h2>
                        <span class="text-[10px] text-green-500 font-bold uppercase">Online</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="call('start')" class="w-9 h-9 flex items-center justify-center text-blue-600 bg-blue-50 rounded-lg"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="document.getElementById('admin-panel').classList.toggle('hidden')" id="admin-trigger" class="hidden w-9 h-9 flex items-center justify-center text-amber-500 bg-amber-50 rounded-lg"><i class="fa-solid fa-crown"></i></button>
                </div>
            </header>

            <div id="admin-panel" class="hidden bg-slate-900 text-white p-4 border-b border-amber-500">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="admin('clear')" class="bg-red-500/20 text-red-400 py-2 rounded-lg text-xs font-bold">LIMPAR CHAT</button>
                    <button onclick="admin('alert')" class="bg-blue-500/20 text-blue-400 py-2 rounded-lg text-xs font-bold">AVISO</button>
                </div>
            </div>

            <div id="chat-feed" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50"></div>

            <div class="p-3 bg-white border-t flex items-center gap-2">
                <button onclick="attach()" class="text-slate-400 px-2"><i class="fa-regular fa-image text-xl"></i></button>
                <input type="text" id="msg-input" placeholder="Escreve aqui..." class="flex-1 bg-slate-100 rounded-xl px-4 py-2 outline-none font-medium text-sm">
                <button onclick="send()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- Overlays -->
        <div id="call-in" class="hidden fixed inset-0 z-[200] bg-blue-600 flex flex-col items-center justify-center text-white p-10 text-center">
            <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mb-8 call-pulse"><i class="fa-solid fa-phone-volume text-4xl"></i></div>
            <h2 class="text-2xl font-bold mb-12">Chamada de Grupo...</h2>
            <div class="flex gap-8">
                <button onclick="call('reject')" class="w-16 h-16 bg-red-500 rounded-full text-2xl border-2 border-white/20"><i class="fa-solid fa-xmark"></i></button>
                <button onclick="call('accept')" class="w-16 h-16 bg-green-500 rounded-full text-2xl border-2 border-white/20"><i class="fa-solid fa-check"></i></button>
            </div>
        </div>

        <div id="call-active" class="hidden fixed inset-0 z-[201] bg-slate-950 flex flex-col items-center justify-around py-20 text-white">
            <div class="text-center space-y-4">
                <div class="w-32 h-32 bg-slate-900 rounded-[2rem] mx-auto border-2 border-blue-500 flex items-center justify-center call-pulse">
                    <i class="fa-solid fa-users text-4xl text-blue-400"></i>
                </div>
                <p id="timer" class="text-3xl font-mono font-bold text-blue-400">00:00</p>
            </div>
            <button onclick="call('end')" class="w-20 h-20 bg-red-600 rounded-full text-3xl shadow-2xl"><i class="fa-solid fa-phone-slash"></i></button>
        </div>

        <div id="profile-modal" class="hidden fixed inset-0 z-[110] bg-black/50 flex items-center justify-center p-6 backdrop-blur-sm">
            <div class="bg-white w-full rounded-3xl p-6">
                <h3 class="font-bold mb-4">Escolhe a tua cor</h3>
                <div class="flex gap-2 mb-6">
                    <button onclick="theme('#0084ff')" class="w-10 h-10 rounded-full bg-[#0084ff]"></button>
                    <button onclick="theme('#8b5cf6')" class="w-10 h-10 rounded-full bg-[#8b5cf6]"></button>
                    <button onclick="theme('#ec4899')" class="w-10 h-10 rounded-full bg-[#ec4899]"></button>
                    <button onclick="theme('#10b981')" class="w-10 h-10 rounded-full bg-[#10b981]"></button>
                </div>
                <button onclick="document.getElementById('profile-modal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Fechar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const cfg = {
            apiKey: "AIzaSyBWUYf1Fhmif7Vpc77oHBGrA_N9azOGvbg",
            authDomain: "instamigos.firebaseapp.com",
            projectId: "instamigos",
            storageBucket: "instamigos.firebasestorage.app",
            messagingSenderId: "186154054682",
            appId: "1:186154054682:web:72837e4985cda660ab8da3"
        };

        const app = initializeApp(cfg);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const app_uid = 'instamigos_v4_prod';

        let user = null;
        let timerInt = null;
        let lastSize = 0;

        window.doAuth = async () => {
            const name = document.getElementById('auth-name').value.trim();
            if(!name) return;
            user = { name, isAdmin: name.toUpperCase() === 'YOHAN', color: '#0084ff' };
            localStorage.setItem('im_v4', JSON.stringify(user));
            await signInAnonymously(auth);
        };

        onAuthStateChanged(auth, (u) => {
            if(u && user) {
                document.getElementById('auth-screen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-chat').classList.remove('hidden');
                }, 500);
                document.getElementById('nav-name').innerText = user.name;
                document.getElementById('nav-avatar').innerText = user.name[0].toUpperCase();
                if(user.isAdmin) document.getElementById('admin-trigger').classList.remove('hidden');
                initChat();
                initCalls();
            }
        });

        const initChat = () => {
            const q = query(collection(db, 'artifacts', app_uid, 'public', 'data', 'msgs'), orderBy('createdAt', 'asc'));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('chat-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.user === user.name;
                    const div = document.createElement('div');
                    div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                    const bubble = document.createElement('div');
                    bubble.className = `max-w-[85%] p-3 shadow-sm ${isMe ? 'message-me' : 'message-them'}`;
                    if(isMe && m.color) bubble.style.background = m.color;
                    
                    if(m.type === 'img' || (m.text && m.text.match(/\.(jpg|jpeg|gif|png|webp)$/) != null)) {
                        bubble.innerHTML = `<span class='text-[9px] font-bold opacity-50 block mb-1'>${m.user}</span><img src="${m.text}" class="rounded-lg max-h-60 w-auto">`;
                    } else {
                        bubble.innerHTML = `<span class='text-[9px] font-bold opacity-50 block mb-1'>${m.user}</span><p class="text-sm font-medium">${m.text}</p>`;
                    }
                    div.appendChild(bubble);
                    feed.appendChild(div);
                });
                if(snap.size > lastSize) {
                    document.getElementById('pop-sound').play().catch(()=>{});
                    lastSize = snap.size;
                }
                feed.scrollTop = feed.scrollHeight;
            });
        };

        window.send = async (val = null, type = 'text') => {
            const input = document.getElementById('msg-input');
            const text = val || input.value.trim();
            if(!text) return;
            await addDoc(collection(db, 'artifacts', app_uid, 'public', 'data', 'msgs'), {
                text, user: user.name, color: user.color, type, createdAt: serverTimestamp()
            });
            input.value = "";
        };

        const initCalls = () => {
            onSnapshot(doc(db, 'artifacts', app_uid, 'public', 'data', 'call'), (s) => {
                const c = s.data();
                if(c?.active && c.by !== user.name) {
                    document.getElementById('call-in').classList.remove('hidden');
                    document.getElementById('ringtone').play().catch(()=>{});
                } else if(!c?.active) {
                    endCallUI();
                }
            });
        };

        window.call = async (act) => {
            if(act === 'start') {
                await setDoc(doc(db, 'artifacts', app_uid, 'public', 'data', 'call'), { active: true, by: user.name });
                window.call('accept');
            } else if(act === 'accept') {
                document.getElementById('ringtone').pause();
                document.getElementById('call-in').classList.add('hidden');
                document.getElementById('call-active').classList.remove('hidden');
                startClock();
            } else if(act === 'reject') {
                document.getElementById('ringtone').pause();
                document.getElementById('call-in').classList.add('hidden');
            } else if(act === 'end') {
                await setDoc(doc(db, 'artifacts', app_uid, 'public', 'data', 'call'), { active: false });
            }
        };

        const endCallUI = () => {
            document.getElementById('ringtone').pause();
            document.getElementById('call-in').classList.add('hidden');
            document.getElementById('call-active').classList.add('hidden');
            clearInterval(timerInt);
        };

        const startClock = () => {
            let s = 0;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                s++;
                const m = Math.floor(s/60).toString().padStart(2,'0');
                const sec = (s%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${sec}`;
            }, 1000);
        };

        window.attach = () => {
            const url = prompt("URL da Imagem ou GIF:");
            if(url) send(url, 'img');
        };

        window.theme = (c) => {
            user.color = c;
            document.getElementById('nav-avatar').style.background = c;
        };

        window.admin = async (t) => {
            if(!user.isAdmin) return;
            if(t === 'clear' && confirm("Limpar histórico?")) {
                const s = await getDocs(collection(db, app_uid, 'public', 'data', 'msgs'));
                s.forEach(async (d) => await deleteDoc(d.ref));
            } else if(t === 'alert') {
                const m = prompt("Aviso:");
                if(m) send(`📢 [SISTEMA]: ${m}`);
            }
            document.getElementById('admin-panel').classList.add('hidden');
        };

        document.getElementById('msg-input').addEventListener('keypress', e => e.key === 'Enter' && send());
        const saved = localStorage.getItem('im_v4');
        if(saved) { user = JSON.parse(saved); signInAnonymously(auth); }
    </script>
</body>
</html>
